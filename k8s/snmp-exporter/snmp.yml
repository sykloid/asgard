auths:
  synology:
    version: 3
    security_level: authPriv
    username: "{{ .username }}"
    password: "{{ .password }}"
    auth_protocol: MD5
    priv_protocol: AES
    priv_password: "{{ .password }}"

modules:
  synology:
    walk:
      - 1.3.6.1.2.1.1.3
      - 1.3.6.1.2.1.2.2
      - 1.3.6.1.2.1.25.1.1
      - 1.3.6.1.2.1.25.2.3
      - 1.3.6.1.2.1.25.3.3
      - 1.3.6.1.2.1.31.1.1
      - 1.3.6.1.4.1.6574.1
      - 1.3.6.1.4.1.6574.2
      - 1.3.6.1.4.1.6574.3
    metrics:
      - name: sysUpTime
        oid: 1.3.6.1.2.1.1.3
        type: gauge
        help: The time (in hundredths of a second) since the network management portion was last re-initialized.
      - name: hrProcessorLoad
        oid: 1.3.6.1.2.1.25.3.3.1.2
        type: gauge
        help: The average percentage of CPU time that this processor was not idle over the last minute.
        indexes:
          - labelname: hrProcessorIndex
            type: gauge
      - name: hrStorageAllocationUnits
        oid: 1.3.6.1.2.1.25.2.3.1.4
        type: gauge
        help: The size in bytes of the data objects allocated from this pool.
        indexes:
          - labelname: hrStorageIndex
            type: gauge
        lookups:
          - labels: [hrStorageIndex]
            labelname: hrStorageDescr
            oid: 1.3.6.1.2.1.25.2.3.1.3
            type: DisplayString
      - name: hrStorageSize
        oid: 1.3.6.1.2.1.25.2.3.1.5
        type: gauge
        help: The size of the storage represented by this entry, in units of hrStorageAllocationUnits.
        indexes:
          - labelname: hrStorageIndex
            type: gauge
        lookups:
          - labels: [hrStorageIndex]
            labelname: hrStorageDescr
            oid: 1.3.6.1.2.1.25.2.3.1.3
            type: DisplayString
      - name: hrStorageUsed
        oid: 1.3.6.1.2.1.25.2.3.1.6
        type: gauge
        help: The amount of the storage used, in units of hrStorageAllocationUnits.
        indexes:
          - labelname: hrStorageIndex
            type: gauge
        lookups:
          - labels: [hrStorageIndex]
            labelname: hrStorageDescr
            oid: 1.3.6.1.2.1.25.2.3.1.3
            type: DisplayString
      - name: ifHCInOctets
        oid: 1.3.6.1.2.1.31.1.1.1.6
        type: counter
        help: Total number of octets received on the interface.
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString
      - name: ifHCOutOctets
        oid: 1.3.6.1.2.1.31.1.1.1.10
        type: counter
        help: Total number of octets transmitted out of the interface.
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifDescr
            oid: 1.3.6.1.2.1.2.2.1.2
            type: DisplayString
      - name: synology_systemTemperature
        oid: 1.3.6.1.4.1.6574.1.2
        type: gauge
        help: Synology system temperature in Celsius.
      - name: synology_powerStatus
        oid: 1.3.6.1.4.1.6574.1.3
        type: gauge
        help: Synology power status (1=Normal, 2=Failed).
      - name: synology_systemFanStatus
        oid: 1.3.6.1.4.1.6574.1.4.1
        type: gauge
        help: Synology system fan status (1=Normal, 2=Failed).
      - name: synology_cpuFanStatus
        oid: 1.3.6.1.4.1.6574.1.4.2
        type: gauge
        help: Synology CPU fan status (1=Normal, 2=Failed).
      - name: synology_diskStatus
        oid: 1.3.6.1.4.1.6574.2.1.1.5
        type: gauge
        help: Synology disk status (1=Normal, 2=Initialized, 3=NotInitialized, 4=SystemPartitionFailed, 5=Crashed).
        indexes:
          - labelname: diskIndex
            type: gauge
        lookups:
          - labels: [diskIndex]
            labelname: diskID
            oid: 1.3.6.1.4.1.6574.2.1.1.2
            type: DisplayString
      - name: synology_diskTemperature
        oid: 1.3.6.1.4.1.6574.2.1.1.6
        type: gauge
        help: Synology disk temperature in Celsius.
        indexes:
          - labelname: diskIndex
            type: gauge
        lookups:
          - labels: [diskIndex]
            labelname: diskID
            oid: 1.3.6.1.4.1.6574.2.1.1.2
            type: DisplayString
      - name: synology_raidStatus
        oid: 1.3.6.1.4.1.6574.3.1.1.3
        type: gauge
        help: Synology RAID status (1=Normal, 2=Repairing, 11=Degrade, 12=Crashed).
        indexes:
          - labelname: raidIndex
            type: gauge
        lookups:
          - labels: [raidIndex]
            labelname: raidName
            oid: 1.3.6.1.4.1.6574.3.1.1.2
            type: DisplayString
      - name: synology_raidFreeSize
        oid: 1.3.6.1.4.1.6574.3.1.1.4
        type: gauge
        help: Synology RAID free size in bytes.
        indexes:
          - labelname: raidIndex
            type: gauge
        lookups:
          - labels: [raidIndex]
            labelname: raidName
            oid: 1.3.6.1.4.1.6574.3.1.1.2
            type: DisplayString
      - name: synology_raidTotalSize
        oid: 1.3.6.1.4.1.6574.3.1.1.5
        type: gauge
        help: Synology RAID total size in bytes.
        indexes:
          - labelname: raidIndex
            type: gauge
        lookups:
          - labels: [raidIndex]
            labelname: raidName
            oid: 1.3.6.1.4.1.6574.3.1.1.2
            type: DisplayString
